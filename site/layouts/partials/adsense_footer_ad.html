{{- /* 页脚广告位 */ -}}
{{- if .Site.Params.adSenseFooterSlot }}
<div class="ad-container ad-footer" style="text-align:center;margin:2rem 0;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ .Site.Params.googleAdSensePubID }}"
       data-ad-slot="{{ .Site.Params.adSenseFooterSlot }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{- end }}
