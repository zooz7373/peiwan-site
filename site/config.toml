baseURL = "https://peiwan.co/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "陪玩 - 游戏攻略大全"
theme = "PaperMod"
[pagination]
  pagerSize = 20
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  googleAdSensePubID = "ca-pub-1034242368296332"
  # 广告单元 ID - 审核通过后在 AdSense 创建广告单元，填入以下 ID
  # adSenseArticleSlot = "文章内广告单元ID"
  # adSenseFooterSlot = "页脚广告单元ID"
  title = "陪玩 - 游戏攻略大全"
  description = "最新最全的游戏攻略、手游推荐、游戏技巧。王者荣耀、原神、和平精英、LOL手游、蛋仔派对、崩坏星穹铁道、金铲铲之战攻略一站搞定。"
  keywords = ["游戏攻略", "手游推荐", "王者荣耀攻略", "原神攻略", "和平精英攻略", "LOL手游攻略", "蛋仔派对攻略", "崩坏星穹铁道攻略", "金铲铲之战攻略"]
  author = "peiwan.co"
  DateFormat = "2006-01-02"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = true
  TocOpen = false
  ShowPageNums = true
  comments = false
  mainSections = ["wangzhe", "yuanshen", "hepingjingying", "lolm", "danzaipaidui", "xingqiongtiedao", "jinchanchanzhizhan"]

  [params.homeInfoParams]
    Title = "陪玩 - 游戏攻略大全"
    Content = "王者荣耀、原神、和平精英、LOL手游、蛋仔派对、崩坏星穹铁道、金铲铲之战，最新攻略、上分技巧、英雄推荐一站搞定。"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    disableFingerprinting = true

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  # Google Analytics - 替换为你的 G-XXXXXXXXXX
  # googleAnalytics = "G-XXXXXXXXXX"

  # 百度统计 - 替换为你的百度统计 ID
  # baiduTongjiID = "your-baidu-tongji-id"


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = false
    guessSyntax = false
    lineNos = false
    style = "monokai"

