worker_processes  1;

error_log  C:/nginx-1.27.5/logs/error.log;
pid        C:/nginx-1.27.5/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_body_temp_path C:/nginx-1.27.5/temp/client_body_temp;
    proxy_temp_path C:/nginx-1.27.5/temp/proxy_temp;
    fastcgi_temp_path C:/nginx-1.27.5/temp/fastcgi_temp;

    sendfile        on;
    keepalive_timeout  65;

    log_format debug '$remote_addr - $host - $request - $status';

    server {
        listen       80 default_server;
        server_name  peiwan.co www.peiwan.co;

        access_log C:/nginx-1.27.5/logs/access.log debug;

        root   C:/www/peiwan;
        index  index.html index.htm;

        location / {
            try_files $uri $uri/ =404;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen       80;
        server_name  debihe.peiwan.co;
        client_max_body_size 5M;
        location / {
            proxy_pass http://127.0.0.1:9999;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen       80;
        server_name  pdd.peiwan.co;

        location / {
            proxy_pass http://127.0.0.1:8088;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen       80;
        server_name  buy.peiwan.co;
        return 301 https://$host$request_uri;
    }

    server {
        listen       443 ssl;
        server_name  buy.peiwan.co;

        ssl_certificate      C:/nginx-1.27.5/conf/ssl/buy.peiwan.co.pem;
        ssl_certificate_key  C:/nginx-1.27.5/conf/ssl/buy.peiwan.co.key;

        ssl_session_timeout  5m;
        ssl_ciphers  ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers  on;

        location /N9IdD7VI66.txt {
            alias C:/nginx-1.27.5/html/N9IdD7VI66.txt;
        }

        location = /lvxing {
            alias C:/prd/lvxing.html;
        }

        location = /wenai {
            alias C:/prd/wenai.html;
        }

        location / {
            proxy_pass http://127.0.0.1:7777;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       80;
        server_name  prd.peiwan.co;

        root   C:/prd;
        index  index.html index.htm;

        location / {
            try_files $uri $uri/ =404;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
